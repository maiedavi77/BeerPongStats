name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Safety check — config.js must not be tracked
        run: |
          if git ls-files --error-unmatch src/config.js 2>/dev/null; then
            echo "ERROR: src/config.js is tracked by git. Remove it from the repo."
            exit 1
          fi
          echo "OK: src/config.js is not tracked."

      - name: Inject src/config.js from secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
        run: |
          cat > src/config.js << EOF
          // Auto-generated by GitHub Actions — do not commit this file
          export const SUPABASE_URL = '${SUPABASE_URL}';
          export const SUPABASE_PUBLISHABLE_KEY = '${SUPABASE_PUBLISHABLE_KEY}';
          EOF
          echo "config.js written."

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          # Exclude files that should not be in the deployed output
          exclude_assets: '.github,supabase,tests,docs,node_modules,*.md'
          force_orphan: false
          commit_message: "deploy: ${{ github.sha }}"

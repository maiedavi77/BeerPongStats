<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#17111F" />
  <meta name="description" content="Real-time beer pong tracker" />
  <title>RACKED</title>

  <!-- PWA manifest (Phase 5) -->
  <!-- <link rel="manifest" href="./manifest.json" /> -->

  <!-- Fonts: Bebas Neue + Inter (critical, needed for first paint) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <!-- JetBrains Mono (non-critical, used for sequence numbers) — load async -->
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap"
    rel="preload" as="style"
    onload="this.onload=null;this.rel='stylesheet'"
  />
  <noscript><link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" /></noscript>

  <!-- Cloudflare Turnstile widget script -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

  <style>
    /* ─── Design tokens ───────────────────────────────────── */
    :root {
      --bg:         #17111F;
      --surface:    #231A2E;
      --surface-2:  #2C2138;
      --surface-3:  #372A45;
      --text:       #F4ECE0;
      --text-dim:   #B6A6C4;
      --text-faint: #83738F;
      --red:        #E2402D;
      --blue:       #3D86C6;
      --amber:      #F2A93B;
      --green:      #74B687;
      --purple:     #9B6FD4;

      --radius-card: 14px;
      --radius-sm:   12px;
      --pad-screen:  18px;
      --pad-card:    16px;
    }

    /* ─── Reset & base ────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    h1, h2, h3 {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.04em;
    }

    code, pre, .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }

    button {
      cursor: pointer;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.65rem 1.25rem;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    button:not(:disabled):active { opacity: 0.75; }

    input, textarea {
      background: var(--surface-2);
      border: 1px solid var(--surface-3);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      padding: 0.65rem 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus { border-color: var(--blue); }
    input::placeholder, textarea::placeholder { color: var(--text-faint); }

    /* ─── Layout shell ────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    #screen {
      flex: 1;
      overflow-y: auto;
      padding: var(--pad-screen);
      padding-bottom: calc(var(--pad-screen) + 64px); /* room for tab bar */
    }

    /* ─── Loading state ───────────────────────────────────── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 1rem;
    }

    #loading h1 {
      font-size: 3.5rem;
      color: var(--purple);
    }

    #loading p {
      color: var(--text-dim);
      font-size: 0.875rem;
    }

    /* ─── Toast notifications ─────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 9999;
      pointer-events: none;
      max-width: 420px;
      width: calc(100% - 2rem);
    }

    .toast {
      background: var(--surface-3);
      color: var(--text);
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.toast-error { border-left: 3px solid var(--red); }
    .toast.toast-success { border-left: 3px solid var(--green); }

    /* ─── Utility classes ─────────────────────────────────── */
    .btn-primary {
      background: var(--purple);
      color: #fff;
      width: 100%;
    }
    .btn-secondary {
      background: var(--surface-3);
      color: var(--text);
    }
    .btn-danger {
      background: var(--red);
      color: #fff;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius-card);
      padding: var(--pad-card);
    }

    .label {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
      display: block;
    }

    .field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }

    .error-msg {
      color: var(--red);
      font-size: 0.8rem;
      margin-top: 0.3rem;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-dim);
    }
    .empty-state h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Screen content rendered here by router -->
    <div id="screen">
      <div id="loading">
        <h1>RACKED</h1>
        <p>Loading…</p>
      </div>
    </div>
    <!-- Tab bar injected by tab-bar.js when authenticated -->
    <nav id="tab-bar"></nav>
  </div>

  <!-- Toast container -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- Boot the app -->
  <script type="module" src="./src/app.js"></script>
</body>
</html>

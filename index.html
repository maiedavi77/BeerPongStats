      {cups:5, name:"House",          slots:[0,4,5,8,9]},
      {cups:5, name:"Triangle",       slots:[0,1,4,5,9]},
      {cups:5, name:"Diamond",        slots:[1,4,6,8,9]},
      {cups:5, name:"Line",           slots:[0,4,7,8,9]},
      {cups:4, name:"Diamond",        slots:[0,5,7,9]},
      {cups:4, name:"Square",         slots:[4,5,7,8]},
      {cups:4, name:"T-shape",        slots:[4,5,6,9]},
      {cups:4, name:"Line",           slots:[0,4,8,9]},
      {cups:3, name:"Triangle",       slots:[0,5,9]},
      {cups:3, name:"Line",           slots:[7,8,9]},
      {cups:3, name:"Rev. triangle",  slots:[4,8,9]},
      {cups:2, name:"Side by side",   slots:[7,8]},
      {cups:2, name:"Front-back",     slots:[0,9]},
      {cups:1, name:"Single",         slots:[9]}
    ],
    6: [
      {cups:5, name:"Near full",      slots:[0,1,2,3,4]},
      {cups:4, name:"Diamond",        slots:[0,3,4,5]},
      {cups:4, name:"Square",         slots:[0,1,3,5]},
      {cups:4, name:"Reverse",        slots:[1,2,3,5]},
      {cups:3, name:"Triangle",       slots:[0,3,5]},
      {cups:3, name:"Rev. triangle",  slots:[1,4,5]},
      {cups:3, name:"Line",           slots:[3,4,5]},
      {cups:2, name:"Side by side",   slots:[3,4]},
      {cups:2, name:"Front-back",     slots:[0,5]},
      {cups:1, name:"Single",         slots:[5]}
    ]
  };

  // Build .rows (array of cup arrays per row) from .slots for preview rendering
  (function(){
    [10,6].forEach(function(cc){
      var layout=RERACK_LAYOUT[cc];
      RERACK_FORMATIONS[cc].forEach(function(f){
        var set={};
        f.slots.forEach(function(s){set[s]=true;});
        f.rows=layout.map(function(row){
          return row.filter(function(s){return set[s];});
        }).filter(function(r){return r.length>0;});
      });
    });
  })();

  function rerackAllowed(g){
    return g.phase==="throw1" && !g._ballsBack;
  }

  function rerackEligible(g, team){
    // Only the DEFENDING team (whose cups are targeted) can re-rack — not the throwing team
    if(team===g.throwingTeam) return false;
    var cups=team==="A"?g.cupsA:g.cupsB;
    var standing=cups.filter(Boolean).length;
    if(standing===g.cupCount||standing===0) return false;
    return !(g._rerackUsed&&g._rerackUsed[team]);
  }

  function openRerackSheet(team){
    var g=state.current;
    var cups=team==="A"?g.cupsA:g.cupsB;
    var standing=cups.filter(Boolean).length;
    var fms=(RERACK_FORMATIONS[g.cupCount]||[]).filter(function(f){return f.cups===standing;});
    if(!fms.length){toast("No formations for "+standing+" cups");return;}

    var col=team==="A"?"var(--red)":"var(--blue)";
    var tLabel=teamName(g,team);

    var fHtml=fms.map(function(f,i){
      var prev=f.rows.map(function(row){
        return '<div class="fp-row">'+row.map(function(){return '<div class="fp-cup '+team+'"></div>';}).join('')+'</div>';
      }).join('');
      return '<div class="formation-card" data-fi="'+i+'"><div class="formation-name">'+esc(f.name)+'</div><div class="formation-preview">'+prev+'</div></div>';
    }).join('');

    var bd=document.createElement("div"); bd.className="sheet-backdrop";
    bd.innerHTML='<div class="sheet"><div class="sheet-handle"></div>'
      +'<h2 style="color:'+col+';">Re-rack \u2014 '+esc(tLabel)+'</h2>'
      +'<p style="font-size:12.5px;color:var(--text-dim);margin:0 0 14px;line-height:1.5;">'+standing+' cup'+(standing===1?"":"s")+' remaining. Pick a formation.</p>'
      +'<div class="rerack-formations">'+fHtml+'</div>'
      +'<button class="btn btn-primary btn-block" id="rr-confirm" disabled>Confirm re-rack</button>'
      +'<button class="btn btn-ghost btn-block" style="margin-top:8px;" id="rr-cancel">Cancel</button>'
      +'<p class="rerack-note">One cup must stay in the back row (closest to your edge). All formations enforce this.</p>'
      +'</div>';
    document.body.appendChild(bd);

    var selFi=null;
    bd.querySelectorAll(".formation-card").forEach(function(c){
      c.addEventListener("click",function(){
        bd.querySelectorAll(".formation-card").forEach(function(x){x.classList.remove("sel");});
        c.classList.add("sel");
        selFi=parseInt(c.getAttribute("data-fi"),10);
        document.getElementById("rr-confirm").disabled=false;
      });
    });
    document.getElementById("rr-cancel").addEventListener("click",function(){bd.remove();});
    bd.addEventListener("click",function(e){if(e.target===bd)bd.remove();});

    document.getElementById("rr-confirm").addEventListener("click",function(){
      if(selFi===null)return;
      var f=fms[selFi];
      pushUndo();
      var newCups=new Array(g.cupCount).fill(false);
      f.slots.forEach(function(s){newCups[s]=true;});
      if(team==="A")g.cupsA=newCups; else g.cupsB=newCups;
      if(!g._rerackUsed)g._rerackUsed={};
      g._rerackUsed[team]=true;
      logFeed(g,"\ud83d\udd04 Re-rack \u2014 "+esc(tLabel)+" \u2192 "+f.name);
      dbWriteRerack(g,team,newCups,f.name).catch(function(e){console.error("[DB] rerack:",e);});
      bd.remove();
      renderGameView();
    });
  }

  function renderGameView(){
    var g=state.current,screen=document.getElementById("screen");
    var tgt=g.throwingTeam==="A"?"B":"A";
    var lA=g.cupsA.filter(Boolean).length,lB=g.cupsB.filter(Boolean).length;
    var isActive=g.status==="active";
    var hasCtrl=isActive&&(g.phase==="throw1"||g.phase==="throw2"||g.phase==="bonus");

    var html='<div class="live-header"><button class="back-link" id="back-to-play">\u2039 All games</button>'
      +(isActive?'<span class="step-pill">'+stepLabel(g)+'</span>':'')+'</div>';

    if(g.status==="complete")
      html+='<div class="result-banner"><div class="big">'+esc(teamName(g,g.winner))+' won it</div><small>'+(g.cupCount-lB)+'\u2013'+(g.cupCount-lA)+' final score</small></div>';
    if(g.status==="cancelled")
      html+='<div class="result-banner" style="background:var(--red-dim);border-color:rgba(226,64,45,0.4);"><div class="big" style="color:#E8897C;">Game cancelled</div></div>';

    html+='<div class="score-big"><span class="num A">'+(g.cupCount-lB)+'</span><span class="dash">\u2013</span><span class="num B">'+(g.cupCount-lA)+'</span></div>';

    if(isActive&&g.phase==="throw2"){
      var t1=g.pendingPair.throws[0];
      html+='<div class="recap">\ud83c\udfd0 <b>Ball 1:</b> '+esc(t1.thrower)+' \u2014 '+throwSummary(t1)+'</div>';
    }
    if(isActive&&g.phase==="bonus")
      html+='<div class="bonus-banner">'+bonusReasonText(g)+' \u2014 pick exactly '+g.bonusRequired+' cup'+(g.bonusRequired===1?"":"s")+' to remove</div>';

    // Re-rack: shown ABOVE the pyramid for the defending team (tgt),
    // only at the start of a new turn (throw1, not balls-back).
    if(isActive&&rerackAllowed(g)&&rerackEligible(g,tgt)){
      var rrCol=tgt==="A"?"var(--red)":"var(--blue)";
      html+='<div class="rerack-row"><button class="rerack-btn" data-rrteam="'+tgt+'" style="border-color:'+rrCol+';color:'+rrCol+';">\ud83d\udd04 Re-rack '+esc(teamName(g,tgt))+'</button></div>';
    }
    html+=pyramidZoneHtml(g,tgt,hasCtrl);

    if(hasCtrl){
      if(g.phase==="throw1"||g.phase==="throw2"){
        html+='<div class="controls"><div class="ctl-label">who threw this ball \u2014 '+esc(teamName(g,g.throwingTeam))+'</div><div class="chips">';
        (g.throwingTeam==="A"?g.teamA:g.teamB).forEach(function(n){
          var isTmp=g.tempPlayers.indexOf(n)>=0;
          html+='<div class="chip'+(g.selectedThrower===n?" active":"")+'" data-thrower="'+esc(n)+'">'+esc(n)+(isTmp?' <span class="temp-tag">one-off</span>':'')+'</div>';
        });
        html+='</div>';
        if(g.throwerIsSuggestion&&g.selectedThrower)
          html+='<div class="suggest-hint">\ud83d\udca1 Suggested: '+esc(g.selectedThrower)+' \u2014 tap to change</div>';
        html+='<div class="dodge-row"><button class="dodge-toggle'+(g.dodgeArmed?" armed":"")+'" id="dodge-toggle">\ud83d\udee1\ufe0f '+(g.dodgeArmed?"Next tap = dodge":"Mark as dodge")+'</button></div>'
          +'<div class="action-row"><button class="miss-btn" id="airball-btn">Airball</button><button class="miss-btn" id="miss-btn">Miss</button></div>'
          +'</div>';
      } else if(g.phase==="bonus"){
        html+='<div class="controls"><div class="bonus-count">'+g.bonusSelected.length+' of '+g.bonusRequired+' selected</div>'
          +'<button class="btn btn-primary btn-block" id="bonus-confirm" '+(g.bonusSelected.length===g.bonusRequired?"":"disabled")+'>Confirm removal</button></div>';
      }
    }

    if(isActive)
      html+='<div class="end-controls"><button class="btn btn-danger-ghost" id="cancel-game-btn">Cancel game</button><button class="btn btn-ghost" id="undo-btn">Undo</button></div>';

    html+='<div class="feed"><div class="section-title">Event feed</div>'
      +g.log.slice(0,40).map(function(l){return '<div class="feed-line"><span>'+esc(l.text)+'</span><span class="t">'+timeShort(l.ts)+'</span></div>';}).join("")
      +(g.log.length===0?'<div class="empty">No throws yet</div>':"")
      +'</div>';

    screen.innerHTML=html;
    document.getElementById("back-to-play").addEventListener("click",function(){state.current=null;renderTab("play");});
    if(isActive){
      document.getElementById("undo-btn").addEventListener("click",doUndo);
      document.getElementById("cancel-game-btn").addEventListener("click",function(){
        confirmDialog("Cancel this game? It won\u2019t count toward stats.",true,function(){
          g.status="cancelled";g.phase="cancelled";state.current=null;renderTab("play");
        });
      });
      if(g.phase==="throw1"||g.phase==="throw2"){
        screen.querySelectorAll(".rerack-btn[data-rrteam]").forEach(function(btn){
          btn.addEventListener("click",function(){openRerackSheet(btn.getAttribute("data-rrteam"));});
        });
        screen.querySelectorAll(".chip[data-thrower]").forEach(function(c){
          c.addEventListener("click",function(){g.selectedThrower=c.getAttribute("data-thrower");g.throwerIsSuggestion=false;renderGameView();});
        });
        document.getElementById("dodge-toggle").addEventListener("click",function(){g.dodgeArmed=!g.dodgeArmed;renderGameView();});
        document.getElementById("airball-btn").addEventListener("click",function(){logThrow("airball",null);});
        document.getElementById("miss-btn").addEventListener("click",function(){logThrow("miss",null);});
        screen.querySelectorAll(".cup:not(.cup--hit)").forEach(function(cup){
          cup.addEventListener("click",function(){logThrow("hit",parseInt(cup.getAttribute("data-idx"),10));});
        });
      } else if(g.phase==="bonus"){
        screen.querySelectorAll(".cup:not(.cup--hit)").forEach(function(cup){
          cup.addEventListener("click",function(){toggleBonusSelect(parseInt(cup.getAttribute("data-idx"),10));});
        });
        document.getElementById("bonus-confirm").addEventListener("click",confirmBonus);
      }
    }
  }

  function stepLabel(g){if(g.phase==="throw1")return "ball 1 of 2";if(g.phase==="throw2")return "ball 2 of 2";if(g.phase==="bonus")return "bonus removal";return "";}
  function throwSummary(t){if(t.outcome==="miss")return "miss";if(t.outcome==="airball")return "airball";return t.dodge?"dodge on cup #"+(t.cupIndex+1):"hit cup #"+(t.cupIndex+1);}
  function bonusReasonText(g){
    if(g.bonusDodgeCount&&g.bonusSameCup)return "\ud83d\udee1\ufe0f\ud83d\udca5 "+g.bonusDodgeCount+" dodge"+(g.bonusDodgeCount>1?"s":"")+" + same-cup double";
    if(g.bonusDodgeCount)return "\ud83d\udee1\ufe0f "+g.bonusDodgeCount+" dodge"+(g.bonusDodgeCount>1?"s":"")+" called";
    return "\ud83d\udca5 Same cup hit twice";
  }

  function pyramidZoneHtml(g,tgt,connected){
    var cups=tgt==="A"?g.cupsA:g.cupsB,rows=cupRows(g.cupCount),pi={};
    if(g.phase==="throw2")g.pendingPair.throws.forEach(function(t){if(t.outcome==="hit")pi[t.cupIndex]=true;});
    var html='<div class="pyramid-zone'+(connected?" connected":"")+'"><div class="pz-label">'
      +(g.status==="active"?'<b>target</b> \u2014 ':'')+esc(teamName(g,tgt))+"'s cups</div>";
    rows.forEach(function(row){
      html+='<div class="pyramid-row">';
      row.forEach(function(i){
        var hit=!cups[i],cls="cup "+tgt,badge="";
        if(hit)cls+=" cup--hit";
        else if(g.phase==="bonus"&&g.bonusSelected.indexOf(i)>=0){cls+=" cup--bonus-sel";badge='<span class="bonus-check">\u2713</span>';}
        else if(pi[i])cls+=" cup--pending";
        html+='<div class="cup-wrap"><div class="'+cls+'" data-idx="'+i+'"></div>'+badge+'</div>';
      });
      html+='</div>';
    });
    return html+'</div>';
  }

  function logThrow(outcome,cupIndex){
    var g=state.current;
    if(!g.selectedThrower){toast("Pick who threw it first");return;}
    pushUndo();
    var t={thrower:g.selectedThrower,team:g.throwingTeam,outcome:outcome,cupIndex:outcome==="hit"?cupIndex:null,dodge:outcome==="hit"?g.dodgeArmed:false,ts:Date.now()};
    g.pendingPair.throws.push(t);g.allThrows.push(t);
    logFeed(g,"\ud83c\udfd0 "+t.thrower+" \u2014 "+throwSummary(t));
    g.dodgeArmed=false;
    if(g.phase==="throw1"){g.phase="throw2";autoSelectThrower(g);renderGameView();return;}
    resolvePair(g);renderGameView();
  }

  function resolvePair(g){
    var t1=g.pendingPair.throws[0],t2=g.pendingPair.throws[1];
    var tgt=g.throwingTeam==="A"?"B":"A",cups=tgt==="A"?g.cupsA:g.cupsB;
    g._targetTeam=tgt; g._bothHit=t1.outcome==="hit"&&t2.outcome==="hit";
    var hi=[]; if(t1.outcome==="hit")hi.push(t1.cupIndex); if(t2.outcome==="hit")hi.push(t2.cupIndex);
    var di=hi.filter(function(v,i){return hi.indexOf(v)===i;});
    di.forEach(function(i){cups[i]=false;});
    if(di.length)logFeed(g,"\ud83c\udfaf "+di.length+" cup"+(di.length>1?"s":"")+" removed");
    // Async background write of throws + cup updates
    (function(t1c,t2c,dic){ dbWriteThrowPair(g,t1c,t2c,dic).catch(function(e){console.error("[DB] throwPair:",e);}); })(t1,t2,di.slice());
    if(!cups.filter(Boolean).length){completeGame(g,g.throwingTeam);return;}
    var dc=(t1.outcome==="hit"&&t1.dodge?1:0)+(t2.outcome==="hit"&&t2.dodge?1:0);
    var sc=g._bothHit&&t1.cupIndex===t2.cupIndex;
    var bc=dc+(sc?2:0);
    if(bc>0){
      g.phase="bonus";g.bonusRequired=Math.min(bc,cups.filter(Boolean).length);
      g.bonusDodgeCount=dc;g.bonusSameCup=sc;g.bonusSelected=[];
      logFeed(g,bonusReasonText(g)+" \u2014 "+g.bonusRequired+" bonus cup"+(g.bonusRequired===1?"":"s")+" owed");
    } else { finalizePair(g); }
  }

  function toggleBonusSelect(i){
    var g=state.current,idx=g.bonusSelected.indexOf(i);
    if(idx>=0)g.bonusSelected.splice(idx,1);
    else{if(g.bonusSelected.length>=g.bonusRequired){toast("Only "+g.bonusRequired+" cup"+(g.bonusRequired===1?"":"s")+" to select");return;}g.bonusSelected.push(i);}
    renderGameView();
  }

  function confirmBonus(){
    var g=state.current;
    if(g.bonusSelected.length!==g.bonusRequired)return;
    pushUndo();
    var cups=g._targetTeam==="A"?g.cupsA:g.cupsB;
    var bonusIdxCopy=g.bonusSelected.slice();
    g.bonusSelected.forEach(function(i){cups[i]=false;});
    logFeed(g,"\ud83d\udca5 Bonus: "+bonusIdxCopy.length+" extra cup"+(bonusIdxCopy.length>1?"s":"")+" removed");
    g.bonusSelected=[];
    dbWriteBonus(g,bonusIdxCopy).catch(function(e){console.error("[DB] bonus:",e);});
    if(!cups.filter(Boolean).length){completeGame(g,g.throwingTeam);renderGameView();return;}
    finalizePair(g);renderGameView();
  }

  function finalizePair(g){
    g.pendingPair={throws:[]};g.phase="throw1";
    if(g._bothHit){
      g._ballsBack=true;
      logFeed(g,"\ud83d\udd01 Balls back \u2014 "+teamName(g,g.throwingTeam)+" throws again");
    } else {
      g._ballsBack=false;
      g._rerackUsed={};
      g.throwingTeam=g.throwingTeam==="A"?"B":"A";
      logFeed(g,"\u21aa\ufe0f Turn over \u2014 "+teamName(g,g.throwingTeam)+" throws next");
    }
    autoSelectThrower(g);
  }

  function completeGame(g,winner){
    g.status="complete";g.phase="complete";g.winner=winner;g.endedAt=Date.now();
    logFeed(g,"\ud83c\udfc6 "+teamName(g,winner)+" wins!");
    toast("Game logged \ud83c\udfc6");
    dbUpdateGame(g).catch(function(e){console.error("[DB] completeGame:",e);});
  }

  /* ============================================================
     LEADERBOARD
     ============================================================ */
  var SORTS={
    winpct:{label:"Win %",fn:function(s){return s.wins+s.losses?s.wins/(s.wins+s.losses):-1;},fmt:function(s){return s.wins+s.losses?Math.round(s.wins/(s.wins+s.losses)*100)+"%":"\u2014";},sub:"win rate"},
    wins:{label:"Wins",fn:function(s){return s.wins;},fmt:function(s){return s.wins;},sub:"wins"},
    accuracy:{label:"Accuracy",fn:function(s){return s.throwsTotal?s.hits/s.throwsTotal:-1;},fmt:function(s){return s.throwsTotal?Math.round(s.hits/s.throwsTotal*100)+"%":"\u2014";},sub:"shot accuracy"},
    cups:{label:"Cups",fn:function(s){return s.hits;},fmt:function(s){return s.hits;},sub:"cups hit"},
    dodged:{label:"Dodged",fn:function(s){return s.dodged;},fmt:function(s){return s.dodged;},sub:"dodges"},
    trichter:{label:"Trichter",fn:function(s){return s.trichterCount||0;},fmt:function(s){return s.trichterCount||0;},sub:"trichters"}
  };

  function computeLeaderboard(){
    var lb={};
    function ens(n){if(!lb[n])lb[n]={wins:0,losses:0,throwsTotal:0,hits:0,dodged:0,gamesPlayed:0,trichterCount:0,trichterFastest:null,trichterTotal:0};}
    state.games.forEach(function(g){
      if(g.status!=="complete")return;
      g.teamA.concat(g.teamB).forEach(ens);
      g.teamA.forEach(function(n){lb[n].gamesPlayed++;if(g.winner==="A")lb[n].wins++;else lb[n].losses++;});
      g.teamB.forEach(function(n){lb[n].gamesPlayed++;if(g.winner==="B")lb[n].wins++;else lb[n].losses++;});
      g.allThrows.forEach(function(t){ens(t.thrower);lb[t.thrower].throwsTotal++;if(t.outcome==="hit"){lb[t.thrower].hits++;if(t.dodge)lb[t.thrower].dodged++;}});
    });
    state.trichters.forEach(function(tr){
      ens(tr.person);lb[tr.person].trichterCount++;lb[tr.person].trichterTotal+=tr.durationMs;
      if(lb[tr.person].trichterFastest===null||tr.durationMs<lb[tr.person].trichterFastest)lb[tr.person].trichterFastest=tr.durationMs;
    });
    return lb;
  }

  function renderLeaderboard(){
    var screen=document.getElementById("screen"),lb=computeLeaderboard(),names=Object.keys(lb);
    var html='<div class="sort-row">';
    Object.keys(SORTS).forEach(function(k){html+='<div class="sort-chip'+(state.lbSort===k?" sel":"")+'" data-sort="'+k+'">'+SORTS[k].label+'</div>';});
    html+='</div>';
    if(!names.length){html+='<div class="empty"><span class="big">Board\'s empty</span>Finish a game to put someone on top.</div>';}
    else{
      var def=SORTS[state.lbSort];
      names.map(function(n){return Object.assign({name:n},lb[n]);}).sort(function(a,b){return def.fn(b)-def.fn(a);}).forEach(function(p,i){
        html+='<div class="lb-row" data-name="'+esc(p.name)+'">'
          +'<div class="lb-rank'+(i===0?" gold":"")+'">'+(i+1)+'</div>'
          +'<div class="lb-name"><div class="nm">'+esc(p.name)+'</div><div class="sub">'+p.wins+'W\u2013'+p.losses+'L \u00b7 '+p.throwsTotal+' throws \u00b7 '+p.trichterCount+' Trichter</div></div>'
          +'<div class="lb-stat"><div class="v">'+def.fmt(p)+'</div><div class="l">'+def.sub+'</div></div></div>';
      });
    }
    screen.innerHTML=html;
    screen.querySelectorAll(".sort-chip").forEach(function(c){c.addEventListener("click",function(){state.lbSort=c.getAttribute("data-sort");renderLeaderboard();});});
    screen.querySelectorAll(".lb-row").forEach(function(r){r.addEventListener("click",function(){openPlayerProfile(r.getAttribute("data-name"));});});
  }

  /* ============================================================
     PLAYER PROFILE
     ============================================================ */
  function computePlayerCupStats(name){
    var bf={6:new Array(6).fill(0),10:new Array(10).fill(0)};
    state.games.forEach(function(g){
      if(g.status!=="complete")return;
      g.allThrows.forEach(function(t){if(t.thrower===name&&t.outcome==="hit")bf[g.cupCount][t.cupIndex]++;});
    });
    return bf;
  }

  function heatmapPyramidHtml(counts,cupCount){
    var rows=cupRows(cupCount),max=Math.max.apply(null,counts.concat([1]));
    var html='<div class="pyramid-zone">';
    rows.forEach(function(row){
      html+='<div class="pyramid-row">';
      row.forEach(function(i){
        var c=counts[i],ratio=c/max,b=c===0?"h0":ratio>0.66?"h3":ratio>0.33?"h2":"h1";
        html+='<div class="heat-cup-wrap"><div class="cup heat '+b+'"></div>'+(c>0?'<span class="heat-count">'+c+'</span>':'')+'</div>';
      });
      html+='</div>';
    });
    return html+'</div>';
  }

  function statBox(v,l){return '<div class="profile-stat"><div class="v">'+v+'</div><div class="l">'+l+'</div></div>';}

  function openPlayerProfile(name){
    var lb=computeLeaderboard();
    var s=lb[name]||{wins:0,losses:0,throwsTotal:0,hits:0,dodged:0,gamesPlayed:0,trichterCount:0,trichterFastest:null,trichterTotal:0};
    var winPct=s.wins+s.losses?Math.round(s.wins/(s.wins+s.losses)*100)+"%":"\u2014";
    var acc=s.throwsTotal?Math.round(s.hits/s.throwsTotal*100)+"%":"\u2014";
    var tAvg=s.trichterCount>0?fmtMs(Math.round(s.trichterTotal/s.trichterCount)):"\u2014";
    var tBest=s.trichterFastest!==null?fmtMs(s.trichterFastest):"\u2014";
    var cs=computePlayerCupStats(name);
    var t10=cs[10].reduce(function(a,b){return a+b;},0),t6=cs[6].reduce(function(a,b){return a+b;},0);
    var uf=t10>=t6?10:6,hh=(t10+t6)>0;
    var bd=document.createElement("div"); bd.className="sheet-backdrop";
    bd.innerHTML='<div class="sheet"><div class="sheet-handle"></div><h2>'+esc(name)+'</h2>'
      +'<div class="section-title" style="margin-top:0;">Game stats</div>'
      +'<div class="profile-stats">'+statBox(s.wins+"\u2013"+s.losses,"record")+statBox(winPct,"win rate")+statBox(acc,"accuracy")+statBox(s.hits,"cups hit")+statBox(s.dodged,"dodges")+statBox(s.throwsTotal,"throws")+'</div>'
      +'<div class="section-title">Trichter</div>'
      +'<div class="profile-stats">'+statBox(s.trichterCount,"count")+statBox(tBest,"fastest")+statBox(tAvg,"avg time")+'</div>'
      +'<div class="section-title">Cup heatmap ('+uf+'-cup layout)</div>'
      +(hh?heatmapPyramidHtml(cs[uf],uf):'<div class="empty">No tracked hits yet</div>')
      +'<button class="btn btn-ghost btn-block" style="margin-top:18px;" id="close-profile">Close</button></div>';
    document.body.appendChild(bd);
    bd.addEventListener("click",function(e){if(e.target===bd)bd.remove();});
    document.getElementById("close-profile").addEventListener("click",function(){bd.remove();});
  }

  /* ============================================================
     TRICHTER
     ============================================================ */
  function renderTrichter(){
    var screen=document.getElementById("screen");
    var sorted=state.trichters.slice().sort(function(a,b){return b.ts-a.ts;});
    var html='<div class="section-title">Recent trichters ('+state.trichters.length+')</div>';
    if(!sorted.length){html+='<div class="empty"><span class="big">No trichters yet</span>Tap + to time one.</div>';}
    else{sorted.slice(0,40).forEach(function(tr){html+='<div class="trichter-row"><div class="t-person">'+esc(tr.person)+'</div><div class="t-dur">'+fmtMs(tr.durationMs)+'</div><div class="t-ts">'+timeShort(tr.ts)+'</div></div>';});}
    screen.innerHTML=html;
  }

  function openAddTrichterSheet(){
    var bd=document.createElement("div"); bd.className="sheet-backdrop";
    var everyone=state.people.map(function(p){return p.name;});
    state.games.forEach(function(g){g.teamA.concat(g.teamB).forEach(function(n){if(everyone.indexOf(n)<0)everyone.push(n);});});
    bd.innerHTML='<div class="sheet"><div class="sheet-handle"></div><h2>Add Trichter</h2>'
      +'<div class="combo-wrap" id="tc-wrap"><input id="tc-input" maxlength="24" placeholder="Select person" autocomplete="off" /><div class="combo-suggestions" hidden></div></div>'
      +'<div class="stopwatch" id="tc-sw">00:00.0</div>'
      +'<div class="sw-hint" id="tc-hint">Select a person, then start the timer</div>'
      +'<button class="btn btn-primary btn-block" id="tc-start" disabled>Start timer</button>'
      +'<button class="btn btn-ghost btn-block" style="margin-top:8px;display:none;" id="tc-confirm">Confirm &amp; save</button>'
      +'<button class="btn btn-ghost btn-block" style="margin-top:8px;" id="tc-cancel">Cancel</button></div>';
    document.body.appendChild(bd);
    var inp=document.getElementById("tc-input"),sugg=bd.querySelector(".combo-suggestions");
    var swEl=document.getElementById("tc-sw"),startBtn=document.getElementById("tc-start"),confirmBtn=document.getElementById("tc-confirm"),hint=document.getElementById("tc-hint");
    var timerInt=null,startMs=null,stoppedMs=null,running=false;
    function renderTC(){
      var q=inp.value.trim().toLowerCase();
      var m=(q?everyone.filter(function(n){return n.toLowerCase().indexOf(q)>=0;}):everyone).slice(0,6);
      var h=m.map(function(n){return '<div class="combo-item" data-name="'+esc(n)+'">'+esc(n)+'</div>';}).join("");
      if(q&&!everyone.some(function(n){return n.toLowerCase()===q;})){h+='<div class="combo-item temp" data-name="'+esc(inp.value.trim())+'">+ "'+esc(inp.value.trim())+'"</div>';}
      if(!h){sugg.hidden=true;return;}
      sugg.innerHTML=h;sugg.hidden=false;
      sugg.querySelectorAll(".combo-item").forEach(function(item){item.addEventListener("mousedown",function(e){e.preventDefault();inp.value=item.getAttribute("data-name");sugg.hidden=true;chk();});});
    }
    function chk(){startBtn.disabled=!(inp.value.trim()&&!running&&!stoppedMs);}
    inp.addEventListener("input",function(){renderTC();chk();}); inp.addEventListener("focus",renderTC);
    inp.addEventListener("blur",function(){setTimeout(function(){sugg.hidden=true;},160);});
    startBtn.addEventListener("click",function(){
      if(running){
        clearInterval(timerInt);timerInt=null;stoppedMs=Date.now()-startMs;running=false;
        swEl.className="stopwatch";swEl.textContent=fmtMs(stoppedMs);
        startBtn.textContent="Restart timer";startBtn.disabled=false;confirmBtn.style.display="";
        hint.textContent="Tap confirm to save, or restart to try again";
      } else {
        stoppedMs=null;startMs=Date.now();running=true;
        swEl.className="stopwatch running";startBtn.textContent="Stop timer";confirmBtn.style.display="none";
        hint.textContent="Timer running\u2026";
        timerInt=setInterval(function(){swEl.textContent=fmtMs(Date.now()-startMs);},100);
      }
    });
    confirmBtn.addEventListener("click",function(){
      if(!stoppedMs||!inp.value.trim())return;
      clearInterval(timerInt);
      state.trichters.unshift({id:uid(),person:inp.value.trim(),durationMs:stoppedMs,ts:Date.now()});
      bd.remove();toast("Trichter saved \u2014 "+fmtMs(stoppedMs));renderTrichter();
    });
    document.getElementById("tc-cancel").addEventListener("click",function(){
      if(running){confirmDialog("Stop timing and discard this trichter?",true,function(){clearInterval(timerInt);bd.remove();});}
      else bd.remove();
    });
    bd.addEventListener("click",function(e){
      if(e.target===bd){if(running){confirmDialog("Stop timing and discard this trichter?",true,function(){clearInterval(timerInt);bd.remove();});}else bd.remove();}
    });
  }

  /* ============================================================
     HISTORY
     ============================================================ */
  function renderHistory(){
    var screen=document.getElementById("screen");
    var games=state.games.slice().sort(function(a,b){return b.startedAt-a.startedAt;});
    var html=!games.length?'<div class="empty"><span class="big">No games yet</span>Your first match will show up here.</div>':games.map(gameCardHtml).join("");
    screen.innerHTML=html;
    screen.querySelectorAll(".game-card").forEach(function(c){
      c.addEventListener("click",function(){
        var g=games.find(function(x){return x.id===c.getAttribute("data-id");});
        if(g.status==="active")openGame(g.id);else openHistoryDetail(g);
      });
    });
  }

  function openHistoryDetail(g){
    var bd=document.createElement("div"); bd.className="sheet-backdrop";
    var lA=g.cupsA.filter(Boolean).length,lB=g.cupsB.filter(Boolean).length;
    bd.innerHTML='<div class="sheet"><div class="sheet-handle"></div><h2>'+esc(teamName(g,"A"))+' vs '+esc(teamName(g,"B"))+'</h2>'
      +'<div class="result-banner" style="'+(g.status==="cancelled"?"background:var(--red-dim);border-color:rgba(226,64,45,0.4);":"")+'">'
        +'<div class="big" style="'+(g.status==="cancelled"?"color:#E8897C;":"")+'">'+(g.status==="cancelled"?"Cancelled":esc(teamName(g,g.winner))+" won")+'</div>'
        +(g.status!=="cancelled"?'<small>'+(g.cupCount-lB)+'\u2013'+(g.cupCount-lA)+'</small>':"")
      +'</div>'
      +'<div class="section-title">Event feed</div>'
      +'<div class="feed">'+g.log.map(function(l){return '<div class="feed-line"><span>'+esc(l.text)+'</span><span class="t">'+timeShort(l.ts)+'</span></div>';}).join("")+'</div>'
      +'<button class="btn btn-ghost btn-block" style="margin-top:16px;" id="close-detail">Close</button></div>';
    document.body.appendChild(bd);
    bd.addEventListener("click",function(e){if(e.target===bd)bd.remove();});
    document.getElementById("close-detail").addEventListener("click",function(){bd.remove();});
  }

  /* ============================================================
     PEOPLE — backed by Supabase profiles + admin-invite-user Edge Function
     ============================================================ */
  function renderPeople(){
    var screen=document.getElementById("screen");
    if(!state.profile){
      screen.innerHTML='<div class="empty">Loading\u2026</div>';
      setTimeout(function(){ if(state.tab==="people") renderPeople(); },500);
      return;
    }
    var canInvite=isAdmin();

    var html='<div class="section-title">Registered players ('+state.people.length+')</div>';
    if(!state.people.length){
      html+='<div class="empty"><span class="big">No players yet</span>Players appear here once they have an account.</div>';
    } else {
      html+='<div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:0;">';
      state.people.forEach(function(p,i){
        var isMe=state.session&&state.profile&&p.id===state.session.user.id;
        var active=p.is_active!==false;
        var rowStyle=(i>0?'border-top:1px solid var(--line);':'')+(active?'':'opacity:0.55;');
        html+='<div class="people-row" style="'+rowStyle+'">'
          +'<div style="flex:1;min-width:0;">'
            +'<div class="nm">'+esc(p.name)
              +(isMe?'<span class="you-badge">you</span>':'')
              +(p.is_admin?'<span class="admin-badge">admin</span>':'')
              +(!active?'<span class="inactive-badge">inactive</span>':'')
            +'</div>'
            +(p.email?'<div class="em">'+esc(p.email)+'</div>':'')
          +'</div>'
          +(canInvite&&!isMe
            ?'<button class="toggle-active-btn '+(active?'deactivate':'activate')+'" data-uid="'+esc(p.id)+'" data-active="'+(active?'1':'0')+'">'+(active?'Deactivate':'Activate')+'</button>'
            :'')
          +'</div>';
      });
      html+='</div>';
    }

    if(canInvite){
      html+='<div class="section-title">Invite a new player</div>'
        +'<div style="background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;">'
          +'<div class="invite-field"><input id="np-name" maxlength="24" placeholder="Display name" /></div>'
          +'<div class="invite-field"><input id="np-email" type="email" maxlength="60" placeholder="Email address" /></div>'
          +'<button class="btn btn-primary btn-block" id="invite-btn">Send invite</button>'
          +'<div class="invite-error" id="invite-error"></div>'
        +'</div>'
        +'<p style="font-size:11.5px;color:var(--text-faint);margin:12px 0 0;line-height:1.5;">They will receive a secure one-time link to set their own password.</p>';
    } else {
      html+='<p style="font-size:11.5px;color:var(--text-faint);margin:14px 0 0;line-height:1.5;">Only admins can invite new players.</p>';
    }

    screen.innerHTML=html;

    if(canInvite){
      screen.querySelectorAll(".toggle-active-btn").forEach(function(btn){
        btn.addEventListener("click",async function(){
          var uid=btn.getAttribute("data-uid");
          var currentlyActive=btn.getAttribute("data-active")==="1";
          var newActive=!currentlyActive;
          var person=state.people.find(function(p){return p.id===uid;});
          var pName=person?person.name:uid;
          confirmDialog(
            (newActive?"Activate":"Deactivate")+" "+pName+"? They will "+(newActive?"regain":"lose")+" access immediately.",
            !newActive,
            async function(){
              btn.disabled=true;
              var res=await sb.functions.invoke("toggle-user-active",{body:{user_id:uid,is_active:newActive}});
              if(res.error||(res.data&&res.data.error)){
                toast("Failed: "+((res.data&&res.data.error)||res.error.message||"unknown error"));
                btn.disabled=false; return;
              }
              await loadPeopleFromSupabase();
              toast(pName+(newActive?" activated \u2014 they can sign in again.":" deactivated \u2014 access revoked."));
              renderPeople();
            }
          );
        });
      });

      var errEl=document.getElementById("invite-error");
      function showInvErr(msg){errEl.textContent=msg;errEl.classList.add("visible");}
      function hideInvErr(){errEl.textContent="";errEl.classList.remove("visible");}

      document.getElementById("invite-btn").addEventListener("click",async function(){
        var name=document.getElementById("np-name").value.trim();
        var email=document.getElementById("np-email").value.trim();
        hideInvErr();
        if(!name||!email){showInvErr("Name and email are required.");return;}
        if(name.length>24){showInvErr("Display name must be 24 characters or fewer.");return;}
        if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){showInvErr("Enter a valid email address.");return;}

        var btn=this; btn.disabled=true; btn.textContent="Sending\u2026";

        var res=await sb.functions.invoke("admin-invite-user",{
          body:{email:email,display_name:name}
        });

        btn.disabled=false; btn.textContent="Send invite";

        if(res.error||(res.data&&res.data.error)){
          showInvErr((res.data&&res.data.error)||res.error.message||"Invite failed.");
          return;
        }

        await loadPeopleFromSupabase();
        toast(name+" invited \u2014 invite email sent.");
        renderPeople();
      });
    }
  }

})();
</script>
</body>
</html>
